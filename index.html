<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ディアドコ計測">
<meta name="theme-color" content="#E65100">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>オーラルディアドコキネシス計測ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:15px; -webkit-text-size-adjust:100%; }
  body {
    font-family:'Noto Sans JP',sans-serif;
    background:#FFF8F0;
    color:#212121;
    line-height:1.4;
    height:100vh; height:100dvh;
    overflow:hidden;
  }

  .wrap {
    height:100%; width:100%;
    display:flex;
    flex-direction:column;
    padding:4px 8px 6px;
  }

  #dk-big-char {
    text-align:center;
    font-size:min(90vw, 60rem);
    font-weight:900;
    line-height:0.85;
    color:#E65100;
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
    overflow:hidden;
  }

  .controls { display:flex; flex-direction:column; gap:4px; }

  .syl-row { display:flex; gap:4px; }
  .dk-syl {
    flex:1;
    padding:6px 0;
    border:3px solid #E0E0E0;
    border-radius:10px;
    background:#fff;
    font-size:1.6rem;
    font-weight:900;
    color:#333;
    cursor:pointer;
    text-align:center;
    font-family:inherit;
    -webkit-tap-highlight-color:transparent;
  }

  .timer-row { display:flex; align-items:center; justify-content:center; gap:16px; }
  .timer-ring { width:56px; height:56px; position:relative; flex-shrink:0; }
  .timer-ring svg { width:100%; height:100%; transform:rotate(-90deg); }
  #dk-timer-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1rem; font-weight:900; color:#333; }
  .count-box { text-align:center; min-width:3.5em; }
  #dk-count { font-size:2rem; font-weight:900; color:#333; line-height:1; transition:transform 0.1s; font-variant-numeric:tabular-nums; }
  .count-unit { font-size:0.7rem; color:#999; }

  #dk-tap {
    width:100%;
    padding:14px 0;
    border:none;
    border-radius:14px;
    font-size:1.4rem;
    font-weight:900;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(135deg,#E65100,#FF8F00);
    box-shadow:0 4px 16px rgba(230,81,0,0.3);
    font-family:inherit;
    -webkit-tap-highlight-color:transparent;
  }

  .res-row { display:flex; gap:4px; }
  .res-cell { flex:1; background:#FAFAFA; border-radius:8px; padding:3px 4px; text-align:center; overflow:hidden; }
  .res-label { font-size:1rem; font-weight:900; }
  .res-val { font-size:0.95rem; color:#BDBDBD; margin-top:1px; height:1.4rem; line-height:1.4rem; display:flex; align-items:center; justify-content:center; }
  .res-retry {
    margin-top:3px;
    padding:4px 0;
    border:1.5px solid transparent;
    border-radius:6px;
    background:transparent;
    font-size:0.65rem;
    font-weight:700;
    color:transparent;
    cursor:default;
    font-family:inherit;
    -webkit-tap-highlight-color:transparent;
    pointer-events:none;
    width:100%;
    line-height:1.2;
  }
  .res-retry.show {
    border-color:#BDBDBD;
    background:#fff;
    color:#999;
    cursor:pointer;
    pointer-events:auto;
  }

  .reset-btn {
    padding:5px 10px;
    border:2px solid #E0E0E0;
    border-radius:10px;
    background:#fff;
    font-size:0.7rem;
    font-weight:600;
    color:#999;
    cursor:pointer;
    font-family:inherit;
    -webkit-tap-highlight-color:transparent;
  }
  .copy-btn {
    flex:3;
    padding:10px;
    border:2px solid #E65100;
    border-radius:10px;
    background:#FFF3E0;
    font-size:0.9rem;
    font-weight:700;
    color:#E65100;
    cursor:pointer;
    font-family:inherit;
    -webkit-tap-highlight-color:transparent;
  }

  /* ── Landscape: side-by-side layout ── */
  @media (orientation: landscape) {
    .wrap {
      flex-direction:row;
      padding:4px 6px;
      gap:8px;
    }

    #dk-big-char {
      flex:1;
      font-size:min(85vh, 50rem);
    }

    .controls {
      width:320px;
      min-width:280px;
      justify-content:center;
      gap:6px;
    }

    .dk-syl { padding:10px 0; font-size:1.8rem; }
    #dk-tap { padding:16px 0; font-size:1.5rem; }
    .timer-ring { width:50px; height:50px; }
    #dk-timer-text { font-size:0.9rem; }
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- Big syllable display -->
  <div id="dk-big-char">パ</div>

  <!-- Controls panel -->
  <div class="controls">
    <!-- Syllable selector -->
    <div class="syl-row">
      <button class="dk-syl" data-syl="pa" onclick="dkSelect('pa')" style="border-color:#E65100;background:#FFF3E0;color:#E65100;">パ</button>
      <button class="dk-syl" data-syl="ta" onclick="dkSelect('ta')">タ</button>
      <button class="dk-syl" data-syl="ka" onclick="dkSelect('ka')">カ</button>
    </div>

    <!-- Timer circle + count -->
    <div class="timer-row">
      <div class="timer-ring">
        <svg viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="62" fill="none" stroke="#E0E0E0" stroke-width="10"/>
          <circle id="dk-progress" cx="70" cy="70" r="62" fill="none" stroke="#E65100" stroke-width="10" stroke-linecap="round" style="stroke-dasharray:389.56;stroke-dashoffset:0;"/>
        </svg>
        <div id="dk-timer-text">5.0</div>
      </div>
      <div class="count-box">
        <div id="dk-count">0</div>
        <div class="count-unit">回</div>
      </div>
    </div>

    <!-- Tap button -->
    <button id="dk-tap" onclick="dkTap(event)">▶ スタート</button>

    <!-- Results (horizontal) with individual retry buttons -->
    <div class="res-row">
      <div class="res-cell">
        <div class="res-label" style="color:#E65100">パ</div>
        <div id="dk-res-pa" class="res-val">-</div>
        <button class="res-retry" id="dk-retry-pa" onclick="dkRetry('pa')">再計測</button>
      </div>
      <div class="res-cell">
        <div class="res-label" style="color:#1565C0">タ</div>
        <div id="dk-res-ta" class="res-val">-</div>
        <button class="res-retry" id="dk-retry-ta" onclick="dkRetry('ta')">再計測</button>
      </div>
      <div class="res-cell">
        <div class="res-label" style="color:#2E7D32">カ</div>
        <div id="dk-res-ka" class="res-val">-</div>
        <button class="res-retry" id="dk-retry-ka" onclick="dkRetry('ka')">再計測</button>
      </div>
    </div>

    <div style="display:flex;gap:4px;margin-top:4px;">
      <button class="reset-btn" onclick="dkReset()" style="flex:1;">リセット</button>
      <button class="copy-btn" onclick="dkCopy()" id="dk-copy-btn">結果をコピー</button>
    </div>
  </div>
</div>

<script>
  const DK_DURATION = 5;
  const DK_THRESHOLD = 6;
  const DK_CIRC = 2 * Math.PI * 62;
  let dkSyl = 'pa', dkState = 'ready', dkCount = 0, dkStart = null, dkTimer = null;
  const dkResults = { pa:null, ta:null, ka:null };
  const dkColors = {
    pa:{main:'#E65100',g1:'#E65100',g2:'#FF8F00'},
    ta:{main:'#1565C0',g1:'#1565C0',g2:'#42A5F5'},
    ka:{main:'#2E7D32',g1:'#2E7D32',g2:'#66BB6A'}
  };
  const dkLabels = {pa:'パ',ta:'タ',ka:'カ'};

  function dkEl(id){ return document.getElementById(id); }

  function dkSelect(s){
    if(dkState==='counting') return;
    dkSyl=s;
    var big=dkEl('dk-big-char');
    big.textContent=dkLabels[s];
    big.style.color=dkColors[s].main;
    document.querySelectorAll('.dk-syl').forEach(function(b){
      var bs=b.dataset.syl;
      var done=dkResults[bs]!==null;
      if(bs===s){
        var c=dkColors[s];
        b.style.borderColor=c.main;b.style.background=c.main+'1A';b.style.color=c.main;
      } else {
        b.style.borderColor=done?'#A5D6A7':'#E0E0E0';b.style.background=done?'#F1F8E9':'#fff';b.style.color=done?'#4CAF50':'#333';
      }
    });
    dkEl('dk-progress').style.stroke=dkColors[s].main;
    dkState='ready'; dkCount=0;
    dkEl('dk-count').textContent='0';
    dkEl('dk-timer-text').textContent='5.0';
    dkEl('dk-progress').style.strokeDashoffset='0';
    var btn=dkEl('dk-tap');
    var c=dkColors[s];
    btn.style.background='linear-gradient(135deg,'+c.g1+','+c.g2+')';
    btn.style.boxShadow='0 4px 16px rgba(230,81,0,0.3)';
    btn.style.pointerEvents='auto';
    btn.textContent='▶ スタート';
    btn.onclick=function(e){dkTap(e);};
    btn.style.display='';
  }

  function dkTap(e){
    if(dkState==='done') return;
    if(dkState==='ready'){dkStartCD();return;}
    if(dkState==='counting'){
      dkCount++;
      var el=dkEl('dk-count');
      el.textContent=dkCount;
      el.style.transform='scale(1.15)';
      setTimeout(function(){el.style.transform='scale(1)';},100);
    }
  }

  function dkStartCD(){
    dkState='counting';dkCount=0;
    dkEl('dk-count').textContent='0';
    dkEl('dk-timer-text').textContent='5.0';
    dkEl('dk-progress').style.strokeDashoffset='0';
    var btn=dkEl('dk-tap');
    var c=dkColors[dkSyl];
    btn.style.background='linear-gradient(135deg,'+c.g1+','+c.g2+')';
    btn.style.pointerEvents='auto';
    btn.textContent=dkLabels[dkSyl]+' をタップ！';
    dkEl('dk-retry-'+dkSyl).classList.add('show');
    dkStart=performance.now();
    dkTimer=setInterval(dkTick,50);
  }

  function dkTick(){
    var elapsed=(performance.now()-dkStart)/1000;
    var rem=Math.max(0,DK_DURATION-elapsed);
    dkEl('dk-timer-text').textContent=rem.toFixed(1);
    dkEl('dk-progress').style.strokeDashoffset=(DK_CIRC*elapsed/DK_DURATION);
    if(rem<=0) dkFinish();
  }

  function dkFinish(){
    clearInterval(dkTimer);dkState='done';
    dkEl('dk-timer-text').textContent='0.0';
    dkEl('dk-progress').style.strokeDashoffset=DK_CIRC;
    var rate=dkCount/DK_DURATION;
    dkResults[dkSyl]={count:dkCount,rate:rate};
    var pass=rate>=DK_THRESHOLD;
    dkEl('dk-res-'+dkSyl).innerHTML='<span style="font-size:0.95rem;font-weight:700;color:'+(pass?'#2E7D32':'#D32F2F')+'">'+rate.toFixed(1)+'</span><span style="font-size:0.7rem;color:#888">/秒</span>';
    // Show retry button for this syllable
    dkEl('dk-retry-'+dkSyl).classList.add('show');
    document.querySelectorAll('.dk-syl').forEach(function(b){
      if(b.dataset.syl===dkSyl){
        b.style.borderColor='#A5D6A7';b.style.background='#F1F8E9';b.style.color='#4CAF50';
      }
    });
    // Disable tap button completely
    var btn=dkEl('dk-tap');
    btn.style.background='linear-gradient(135deg,#757575,#9E9E9E)';
    btn.style.boxShadow='0 4px 12px rgba(0,0,0,0.1)';
    btn.style.pointerEvents='none';
    var allDone = dkResults.pa!==null && dkResults.ta!==null && dkResults.ka!==null;
    if(allDone){
      btn.textContent='全て計測完了';
      dkEl('dk-big-char').textContent='✓';
      dkEl('dk-big-char').style.color='#4CAF50';
    } else {
      btn.textContent=dkLabels[dkSyl]+' 計測終了';
    }
  }

  function dkRetry(s){
    clearInterval(dkTimer);
    dkState='ready';
    dkResults[s]=null;
    dkEl('dk-res-'+s).innerHTML='-';
    dkEl('dk-res-'+s).style.color='#BDBDBD';
    dkEl('dk-retry-'+s).classList.remove('show');
    dkEl('dk-tap').style.display='';
    dkSelect(s);
  }

  function dkReset(){
    clearInterval(dkTimer);
    dkState='ready';
    dkResults.pa=null;dkResults.ta=null;dkResults.ka=null;
    dkEl('dk-res-pa').innerHTML='-';dkEl('dk-res-pa').style.color='#BDBDBD';
    dkEl('dk-res-ta').innerHTML='-';dkEl('dk-res-ta').style.color='#BDBDBD';
    dkEl('dk-res-ka').innerHTML='-';dkEl('dk-res-ka').style.color='#BDBDBD';
    dkEl('dk-retry-pa').classList.remove('show');
    dkEl('dk-retry-ta').classList.remove('show');
    dkEl('dk-retry-ka').classList.remove('show');
    dkEl('dk-tap').style.display='';
    dkSelect('pa');
  }

  function dkCopy(){
    var lines=['オーラルディアドコキネシス計測結果'];
    ['pa','ta','ka'].forEach(function(s){
      var r=dkResults[s];
      var label=dkLabels[s];
      if(r){
        var judge=r.rate>=DK_THRESHOLD?'正常':'低下';
        lines.push(label+': '+r.rate.toFixed(1)+'/秒 ('+r.count+'回/5秒) '+judge);
      } else {
        lines.push(label+': 未計測');
      }
    });
    var text=lines.join('\n');
    navigator.clipboard.writeText(text).then(function(){
      var btn=dkEl('dk-copy-btn');
      btn.textContent='コピーしました';
      setTimeout(function(){btn.textContent='結果をコピー';},1500);
    });
  }

  document.addEventListener('touchend',function(e){
    var t=e.target.closest('#dk-tap,.dk-syl,.reset-btn,.copy-btn,.res-retry');
    if(t){e.preventDefault();t.click();}
  },{passive:false});
</script>
</body>
</html>
